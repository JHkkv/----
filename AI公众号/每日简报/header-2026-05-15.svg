<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- decorative circles -->
  <circle cx="650" cy="80" r="120" fill="none" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <circle cx="680" cy="50" r="60" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="320" r="80" fill="none" stroke="#e94560" stroke-width="1" opacity="0.2"/>
  <circle cx="50" cy="350" r="40" fill="#e94560" opacity="0.08"/>

  <!-- grid dots background -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="800" height="400" fill="url(#dots)"/>
  </g>

  <!-- accent line -->
  <rect x="60" y="200" width="120" height="4" fill="url(#accent)" rx="2"/>

  <!-- main text -->
  <text x="60" y="140" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">
    AI 日报
  </text>
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="20" fill="#a0a0b8">
    2026 年 5 月 15 日 · 星期五
  </text>

  <!-- subtitle box -->
  <text x="60" y="270" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff6b6b">
    40 条 AI 精选
  </text>
  <text x="60" y="310" font-family="Arial, sans-serif" font-size="16" fill="#707090">
    AI HOT · Hacker News · arXiv · GitHub Trending
  </text>

  <!-- right side decoration - neural network nodes -->
  <g opacity="0.25">
    <circle cx="500" cy="280" r="4" fill="#e94560"/>
    <circle cx="560" cy="240" r="4" fill="#ff6b6b"/>
    <circle cx="620" cy="300" r="4" fill="#e94560"/>
    <circle cx="580" cy="340" r="4" fill="#ff6b6b"/>
    <circle cx="530" cy="310" r="4" fill="#e94560"/>
    <line x1="500" y1="280" x2="560" y2="240" stroke="#e94560" stroke-width="1.5"/>
    <line x1="560" y1="240" x2="620" y2="300" stroke="#e94560" stroke-width="1.5"/>
    <line x1="620" y1="300" x2="580" y2="340" stroke="#e94560" stroke-width="1.5"/>
    <line x1="580" y1="340" x2="530" y2="310" stroke="#e94560" stroke-width="1.5"/>
    <line x1="530" y1="310" x2="500" y2="280" stroke="#e94560" stroke-width="1.5"/>
    <line x1="500" y1="280" x2="620" y2="300" stroke="#ff6b6b" stroke-width="1"/>
    <line x1="560" y1="240" x2="580" y2="340" stroke="#ff6b6b" stroke-width="1"/>
  </g>
</svg>
