version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: treehole-db
    environment:
      POSTGRES_USER: treehole
      POSTGRES_PASSWORD: treehole
      POSTGRES_DB: treehole
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
